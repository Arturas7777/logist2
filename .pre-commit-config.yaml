repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        # --target-version=py310 дублирует [tool.ruff] из pyproject.toml,
        # это defensive guard: pre-commit может игнорировать pyproject в
        # некоторых сценариях (CI без рабочего dir, isolated tmpdir),
        # а UP-правила для 3.11+ ломают прод (Python 3.10 на VPS).
        # См. fix-коммит a91de68 (datetime.UTC → ImportError) и
        # docs/ROADMAP_2026-05_high_medium.md → M3.
        args: [--fix, --target-version=py310]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/adamchainz/django-upgrade
    rev: "1.23.0"
    hooks:
      - id: django-upgrade
        # Django версия из requirements.txt (Django==5.2.14).
        # У django-upgrade нет Python-target — он преобразует только
        # Django-API. Python-совместимость рулится ruff (см. выше).
        args: [--target-version, "5.2"]
