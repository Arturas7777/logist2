[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "logist2.settings.test"
python_files = ["test_*.py", "tests.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks integration tests",
]

# pytest-env: безусловно override DJANGO_SETTINGS_MODULE, даже если в шелле
# уже выставлено `logist2.settings.dev` (типичный случай после `manage.py
# check` / `runserver`). Без этого тесты загружали dev-настройки + PG
# legacy schema и падали с FieldDoesNotExist. См. H7.
#
# Native TOML-форма (`[tool.pytest_env]`) переопределяет значения из env по
# умолчанию (в отличие от INI-формы с `D:` префиксом, который наоборот
# default-only). См. https://pypi.org/project/pytest-env/.
[tool.pytest_env]
DJANGO_SETTINGS_MODULE = "logist2.settings.test"

[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = [
    "core/migrations/*",
    "scripts/debug/*",
    "_*.py",
]

[tool.ruff.lint]
# Минимально-строгий набор, который проходит текущий код.
# Расширить до ["E", "W", "F", "I", "N", "UP", "B", "SIM", "DJ"] — задача P1.
select = [
    "E9",    # syntax errors
    "F63",   # invalid assertions
    "F7",    # syntax errors in forward refs
    "F82",   # undefined name
    "F401",  # unused imports (в новом коде)
    "F811",  # redefined unused
    "F821",  # undefined variable
    "F841",  # local variable assigned but never used
    "I",     # isort (предупреждения, но многие файлы уже ок)
    "W291",  # trailing whitespace
    "W292",  # missing newline at EOF
    "W293",  # blank line contains whitespace
    "W605",  # invalid escape sequence
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.per-file-ignores]
"core/migrations/*" = ["I", "F401", "F811"]
"scripts/debug/*" = ["I", "F401", "F811", "F841"]
"**/tests/*" = ["F811"]
"logist2/urls.py" = ["I", "F401"]
"logist2/settings/__init__.py" = ["F401", "F403"]

[tool.ruff.lint.isort]
known-first-party = ["core", "logist2"]
