[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "logist2.settings.test"
python_files = ["test_*.py", "tests.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks integration tests",
]

# pytest-env: безусловно override DJANGO_SETTINGS_MODULE, даже если в шелле
# уже выставлено `logist2.settings.dev` (типичный случай после `manage.py
# check` / `runserver`). Без этого тесты загружали dev-настройки + PG
# legacy schema и падали с FieldDoesNotExist. См. H7.
#
# Native TOML-форма (`[tool.pytest_env]`) переопределяет значения из env по
# умолчанию (в отличие от INI-формы с `D:` префиксом, который наоборот
# default-only). См. https://pypi.org/project/pytest-env/.
[tool.pytest_env]
DJANGO_SETTINGS_MODULE = "logist2.settings.test"

[tool.ruff]
# Минимальная поддерживаемая версия Python (см. README, scripts/*.service).
# Локально dev часто на 3.13, сервер на 3.10, CI на 3.12.
target-version = "py310"
line-length = 120
extend-exclude = [
    "core/migrations/*",
    "scripts/debug/*",
    "_*.py",
]

[tool.ruff.lint]
# Расширенный набор после M3 (был минимальный E9/F63/…/W*).
# Подключены целиком семейства: E, F, W, I (исходный набор), плюс UP
# (pyupgrade), B (bugbear), C4 (comprehensions), DJ (django), RUF
# (ruff-specific).
#
# PL (Pylint) намеренно не включали — слишком шумно по умолчанию,
# требует тонкой настройки порогов. Можно добавить отдельно при росте
# покрытия.
select = [
    "E",     # pycodestyle errors
    "F",     # pyflakes
    "W",     # pycodestyle warnings
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "DJ",    # flake8-django
    "RUF",   # ruff-specific
]
ignore = [
    "E501",     # line too long (форматер; у нас 120 line-length, но многие старые файлы шире).
    # — Кириллица в строках/комментариях/docstrings — у проекта 3 языка
    #   контента (LT/EN/RU); это не «ambiguous unicode», а нормальный текст.
    "RUF001",   # ambiguous-unicode-character-string
    "RUF002",   # ambiguous-unicode-character-docstring
    "RUF003",   # ambiguous-unicode-character-comment
    # — Mutable class defaults — Django ModelAdmin.list_display и т.п.
    #   являются классическим паттерном, не баг.
    "RUF012",   # mutable-class-default
    # — Function call as default argument — обычная практика для
    #   `default=timezone.now`, `default=dict`, и т.п. в Django-моделях.
    "B008",     # function-call-in-default-argument
    # — Django-специфика: null=True на CharField/TextField — иногда
    #   намеренный выбор (NULLable из-за data integrity). __str__ на
    #   модели — не везде осмысленно. UnorderedBody — стилистическое.
    "DJ001",    # nullable-string-field
    "DJ008",    # model-without-__str__
    "DJ012",    # unordered-body-content-in-model
    # — Settings split (`from .base import *`) и Django apps load
    #   order заставляют импорты идти не первой строкой.
    "E402",     # module-import-not-at-top-of-file
    # — Стилистические остатки, не блокеры. Зафиксированы как TODO
    #   на отдельный refactor (см. M3 в roadmap).
    "B904",     # raise-without-from-inside-except
    "UP035",    # deprecated-import (typing → collections.abc)
    # — UP017 (datetime.timezone.utc → datetime.UTC) требует Python 3.11+.
    #   Прод-сервер на 3.10 (см. scripts/*.service / README). При
    #   `target-version = "py310"` ruff и так не должен применять UP017,
    #   но `--unsafe-fixes` исторически уже один раз заменил импорт
    #   и уронил daphne (см. fix-коммит a91de68). Подавляем явно как
    #   defensive guard от регрессий при будущих ruff/pyupgrade-апдейтах.
    "UP017",    # datetime-timezone-utc
    "B007",     # unused-loop-control-variable
    "E722",     # bare-except (5 случаев, точечно обернуть отдельным PR)
    "E741",     # ambiguous-variable-name (l/I/O)
    "DJ007",    # all-fields-in-modelform
    "UP031",    # printf-string-formatting
]

[tool.ruff.lint.per-file-ignores]
"core/migrations/*" = ["I", "F401", "F811"]
"scripts/debug/*" = ["I", "F401", "F811", "F841"]
"**/tests/*" = ["F811"]
"logist2/urls.py" = ["I", "F401"]
"logist2/settings/__init__.py" = ["F401", "F403"]
# Settings *-imports: подавляем «undefined-local-with-import-star-usage».
"logist2/settings/*.py" = ["F403", "F405"]

[tool.ruff.lint.isort]
known-first-party = ["core", "logist2"]
