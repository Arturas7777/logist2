{% extends "admin/custom_page_base.html" %}
{% load i18n %}

{% block title %}Поступление на карту{% endblock %}
{% block content_title %}<h1><i class="bi bi-plus-circle"></i> Поступление на карту</h1>{% endblock %}

{% block content %}
<div class="wallet-form">
    <form method="post">
        {% csrf_token %}
        <div class="field-group">
            <label for="id_card">Карта</label>
            <select id="id_card" name="card" required>
                <option value="">— Выберите карту —</option>
                {% for card in cards %}
                <option value="{{ card.pk }}">{{ card }} ({{ card.balance|floatformat:2 }} €)</option>
                {% endfor %}
            </select>
        </div>

        <div class="field-group">
            <label for="id_amount">Сумма (€)</label>
            <input type="number" id="id_amount" name="amount" step="0.01" min="0.01"
                   placeholder="0.00" required autofocus>
        </div>

        <div class="field-group">
            <label for="id_description">Источник / описание</label>
            <input type="text" id="id_description" name="description"
                   placeholder="Пособие на ребёнка, возврат, зарплата..." required>
        </div>

        <button type="submit" class="submit-btn green">Записать поступление</button>
    </form>

    <div class="cm-back">
        <a href="{% url 'personal_cards_page' %}">← Назад к картам</a>
    </div>
</div>
{% endblock %}
