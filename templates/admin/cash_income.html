{% extends "admin/custom_page_base.html" %}
{% load i18n %}

{% block title %}Пополнить кошелёк{% endblock %}
{% block content_title %}<h1><i class="bi bi-wallet2"></i> Пополнить кошелёк</h1>{% endblock %}

{% block content %}
<div class="wallet-form">
    <div class="cash-badge">
        <div class="label">Наличные на руках</div>
        <div class="value">{{ current_cash|floatformat:2 }} €</div>
    </div>

    <form method="post">
        {% csrf_token %}
        <div class="field-group">
            <label for="id_amount">Сумма (€)</label>
            <input type="number" id="id_amount" name="amount" step="0.01" min="0.01"
                   placeholder="0.00" required autofocus>
        </div>

        <div class="field-group">
            <label for="id_description">Источник / описание</label>
            <input type="text" id="id_description" name="description"
                   placeholder="Клиент заплатил наличными, зарплата, возврат..." required>
        </div>

        <button type="submit" class="submit-btn green">Пополнить кошелёк</button>
    </form>

    <div class="cm-back">
        <a href="{% url 'company_dashboard' %}">← Вернуться на дашборд</a>
    </div>
</div>
{% endblock %}
