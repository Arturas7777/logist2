name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    # tests-with-migrations: каждую ночь в 04:00 UTC (M4).
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.9.10
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  django-checks:
    name: Django checks (migrations + deploy)
    runs-on: ubuntu-latest
    needs: lint
    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SETTINGS_MODULE: logist2.settings.test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check for missing migrations
        run: python manage.py makemigrations --check --dry-run
      - name: Check templates + URL config
        run: python manage.py check
      - name: Security deploy check
        # Не падаем на warnings, но печатаем их для ревью.
        run: python manage.py check --deploy --fail-level ERROR

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_logist2
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: test_logist2
      DB_USER: test_user
      DB_PASSWORD: test_pass
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      CACHE_BACKEND: redis
      CHANNELS_BACKEND: memory
      DJANGO_SETTINGS_MODULE: logist2.settings.test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest (full suite)
        # Порог по core/ — ratchet: держим его на текущем фактическом
        # уровне покрытия, чтобы новый код не снижал общий процент.
        # Поднимать по мере роста покрытия (не опускать).
        run: pytest --tb=short --maxfail=5 --cov=core --cov-fail-under=32

      - name: Critical modules coverage (billing/encryption/reconciliation)
        # Money-critical модули должны иметь высокое покрытие, даже если общий
        # порог по core/ ниже. Поднимать постепенно по мере роста покрытия.
        run: |
          pytest \
            --tb=short \
            --cov=core.encryption \
            --cov=core.services.billing_service \
            --cov=core.services.car_lifecycle_service \
            --cov=core.management.commands.auto_reconcile \
            --cov=core.management.commands.rotate_encryption_key \
            --cov-report=term \
            --cov-fail-under=55 \
            core/tests/test_encryption.py \
            core/tests/test_billing_service.py \
            core/tests/test_reconciliation.py \
            core/tests/test_lifecycle.py \
            core/tests/test_billing.py

  tests-with-migrations:
    # Прокатывает ВСЮ цепочку миграций `core/migrations/0001..*` на чистой
    # PostgreSQL — ловит расхождения между моделями и миграциями, которые
    # маскирует `DisableMigrations` в `logist2.settings.test`. Использует
    # отдельный профиль `logist2.settings.test_migrations`.
    #
    # Теперь обязателен на каждом PR (а не только ночью / по label), чтобы
    # регрессии миграций не доезжали до master до ночного прогона.
    name: Tests with migrations
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: test_logist2
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test_user"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_NAME: test_logist2
      DB_USER: test_user
      DB_PASSWORD: test_pass
      DB_HOST: localhost
      DB_PORT: 5432
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      CACHE_BACKEND: redis
      CHANNELS_BACKEND: memory
      DJANGO_SETTINGS_MODULE: logist2.settings.test_migrations

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Apply ALL migrations (sanity check)
        # Это smoke-check: миграции не должны падать на чистой БД.
        # pytest-django сделает migrate сам, но отдельный шаг даёт более
        # понятный лог при проблемах в конкретной миграции.
        run: python manage.py migrate --noinput

      - name: Check makemigrations consistency
        # После migrate проверяем, что модели и миграции синхронизированы.
        run: python manage.py makemigrations --check --dry-run

      - name: Run pytest with real migrations
        # `-p no:env` отключает pytest-env, который иначе перебил бы
        # DJANGO_SETTINGS_MODULE на logist2.settings.test (с
        # DisableMigrations). См. pyproject.toml [tool.pytest_env].
        run: pytest -p no:env --tb=short --maxfail=5

  security-scan:
    # SCA (pip-audit) + SAST (bandit). Для финансового приложения это
    # обязательный минимум аудита уязвимостей зависимостей и кода.
    #
    # Baseline зачищен: зависимости обновлены до фикс-версий (pip-audit
    # чист), HIGH-находки bandit устранены. Поэтому pip-audit и bandit-HIGH
    # теперь БЛОКИРУЮЩИЕ. Bandit-MEDIUM (mark_safe в admin) пока advisory —
    # требует перевода на format_html в отдельном PR.
    name: Security scan (pip-audit + bandit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scanners
        run: pip install pip-audit bandit[toml]

      - name: pip-audit (зависимости / known CVE) — блокирующий
        run: pip-audit -r requirements.txt --progress-spinner off

      - name: bandit HIGH severity — блокирующий
        run: bandit -r core logist2 --severity-level high --confidence-level high -x core/tests,core/migrations

      - name: bandit MEDIUM severity — блокирующий
        # R2 (AUDIT_ROUND3): mark_safe в admin-дисплеях переведён на
        # format_html/format_html_join, baseline чист — MEDIUM блокирует.
        run: bandit -r core logist2 -ll -x core/tests,core/migrations
